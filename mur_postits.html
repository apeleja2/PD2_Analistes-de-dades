<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de les Idees - Fix API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-mural: #fdfbf7;
            --color-agradat: #fff0f3; 
            --color-apres: #f0fff4;   
            --color-interes: #eef2ff; 
            --color-dificultat: #fff7ed; 
            --color-dubtes: #faf5ff;  
        }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-mural); color: #334155; }
        .handwritten { font-family: 'Patrick Hand', cursive; }
        .post-it { padding: 1rem; border-radius: 8px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); min-height: 60px; display: flex; align-items: center; justify-content: center; text-align: center; }
        .col-0 { background-color: var(--color-agradat); }
        .col-1 { background-color: var(--color-apres); }
        .col-2 { background-color: var(--color-interes); }
        .col-3 { background-color: var(--color-dificultat); }
        .col-4 { background-color: var(--color-dubtes); }
        .loader { border-top-color: #fbbf24; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .ia-quote { font-family: 'Patrick Hand', cursive; font-size: 1.1rem; color: #475569; border-left: 4px solid #fde047; padding: 0.5rem 1rem; margin: 1rem 0; background: #fefce8; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div class="fixed top-4 right-4 z-50 flex gap-2">
        <button onclick="carregarDades()" class="bg-slate-800 text-white p-3 rounded-full shadow-lg hover:scale-105 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
        </button>
        <button onclick="obrirConfiguracio()" class="bg-white border border-slate-200 text-slate-400 px-3 py-1 rounded-lg text-[10px] font-bold uppercase">Configurar API</button>
    </div>

    <header class="max-w-7xl mx-auto pt-12 pb-8 text-center px-4">
        <h1 class="text-5xl font-black text-slate-800 mb-2">Mural de les Idees</h1>
        <p class="text-slate-400 font-medium uppercase tracking-widest text-xs">Escoles PCMAT</p>
        <div id="filterContainer" class="flex flex-wrap justify-center gap-2 mt-8"></div>
    </header>

    <main class="max-w-[1400px] mx-auto px-6">
        <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
            <div class="loader rounded-full border-4 h-10 w-10 mb-4"></div>
            <p class="handwritten text-xl text-slate-400">Actualitzant mural...</p>
        </div>
        <div id="muralGrid" class="space-y-16"></div>
    </main>

    <!-- Modal Resum IA -->
    <div id="reportModal" class="hidden fixed inset-0 z-50 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl max-h-[90vh] rounded-3xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-6 border-b flex justify-between items-center bg-yellow-50">
                <h3 class="font-bold text-xl text-slate-800">✨ Foto de les veus</h3>
                <button onclick="tancarModal()" class="text-slate-400 hover:text-red-500">✕</button>
            </div>
            <div id="reportContent" class="p-8 overflow-y-auto bg-white flex-1"></div>
            <div class="p-4 bg-slate-50 border-t flex justify-center gap-4">
                <button id="btnDownloadPDF" onclick="descarregarPDF()" class="hidden bg-slate-900 text-white px-8 py-3 rounded-xl font-bold">Descarregar PDF</button>
                <button onclick="tancarModal()" class="px-6 py-3 text-slate-400 font-bold">Tancar</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyd8EMwdnW3MVat7v7zWbj5n0CHM5sl8Ket0HZcKdEVAqGysjMqH0POzgTA6NX2LHue3Q/exec";
        let dadesTotals = [];
        let escolesActives = new Set();
        let clauEscola = "";

        const SECCIONS = [
            { títol: "M'ha agradat...", icona: "❤️" },
            { títol: "He après...", icona: "🎓" },
            { títol: "M'ha interessat...", icona: "🌟" },
            { títol: "Dificultats", icona: "🧩" },
            { títol: "Dubtes", icona: "🤔" }
        ];

        async function carregarDades() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
                dadesTotals = await res.json();
                if (dadesTotals.length > 0) {
                    const claus = Object.keys(dadesTotals[0]);
                    clauEscola = claus.find(k => k.toLowerCase().includes('centre') || k.toLowerCase().includes('escola')) || claus[1];
                    const escolesUniques = [...new Set(dadesTotals.map(d => d[clauEscola]).filter(Boolean))].sort();
                    if (escolesActives.size === 0) escolesUniques.forEach(e => escolesActives.add(e));
                    renderFiltres(escolesUniques);
                    renderMural();
                }
            } catch (e) { console.error(e); }
            finally { document.getElementById('loading').classList.add('hidden'); }
        }

        function renderFiltres(escoles) {
            const container = document.getElementById('filterContainer');
            container.innerHTML = '';
            escoles.forEach(escola => {
                const actiu = escolesActives.has(escola);
                const btn = document.createElement('button');
                btn.className = `px-4 py-1.5 rounded-full text-xs font-bold transition-all ${actiu ? 'bg-yellow-400 text-yellow-900 shadow-md' : 'bg-white text-slate-400 border border-slate-200'}`;
                btn.innerText = escola;
                btn.onclick = () => {
                    if (escolesActives.has(escola)) { if (escolesActives.size > 1) escolesActives.delete(escola); }
                    else { escolesActives.add(escola); }
                    renderFiltres(escoles); renderMural();
                };
                container.appendChild(btn);
            });
        }

        function renderMural() {
            const grid = document.getElementById('muralGrid');
            grid.innerHTML = '';
            const claus = Object.keys(dadesTotals[0]);
            Array.from(escolesActives).forEach(escolaNom => {
                const respostes = dadesTotals.filter(d => d[clauEscola] === escolaNom);
                const section = document.createElement('section');
                section.className = "bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100";
                section.innerHTML = `
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="font-black text-3xl text-slate-800">${escolaNom}</h2>
                        <button onclick="ferResumIA('${escolaNom.replace(/'/g, "\\'")}')" class="bg-yellow-400 text-yellow-900 px-6 py-2 rounded-xl font-bold text-sm shadow hover:bg-yellow-300 transition-colors">✨ Generar Resum</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                        ${SECCIONS.map((sec, i) => {
                            const textos = respostes.map(r => r[claus[i + 2]]).filter(t => t && t.toString().trim().length > 1);
                            return `
                                <div class="space-y-3">
                                    <h4 class="text-[10px] uppercase font-bold text-slate-300 tracking-tighter">${sec.icona} ${sec.títol}</h4>
                                    ${textos.map(txt => `<div class="post-it col-${i}"><p class="handwritten text-sm text-slate-700 leading-tight">${txt}</p></div>`).join('')}
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                grid.appendChild(section);
            });
        }

        function obrirConfiguracio() {
            const actual = localStorage.getItem('gemini_api_key') || "";
            const nova = prompt("Configura la teva API Key:", actual);
            if (nova !== null) localStorage.setItem('gemini_api_key', nova.trim());
        }

        async function ferResumIA(nomEscola) {
            const apiKey = localStorage.getItem('gemini_api_key');
            if (!apiKey) { obrirConfiguracio(); return; }

            const content = document.getElementById('reportContent');
            const btnPdf = document.getElementById('btnDownloadPDF');
            document.getElementById('reportModal').classList.remove('hidden');
            btnPdf.classList.add('hidden');
            content.innerHTML = `<div class="text-center py-10"><div class="loader inline-block rounded-full border-4 h-8 w-8 mb-2"></div><p class="handwritten text-lg text-slate-500">Connectant amb l'API estable de Google...</p></div>`;

            // CONFIGURACIÓ DE L'API ESTABLE (v1)
            const MODEL_ESTABLE = "gemini-1.5-flash"; 
            const URL_API = `https://generativelanguage.googleapis.com/v1/models/${MODEL_ESTABLE}:generateContent?key=${apiKey}`;

            const respostes = dadesTotals.filter(d => d[clauEscola] === nomEscola);
            const claus = Object.keys(respostes[0]);
            const dadesText = respostes.map(r => 
                `❤️:${r[claus[2]]} | 🎓:${r[claus[3]]} | 🌟:${r[claus[4]]} | 🧩:${r[claus[5]]} | 🤔:${r[claus[6]]}`
            ).join('\n');

            const prompt = `Analitza les dades de l'escola ${nomEscola}. Redacta un resum motivador de 4-5 paràgrafs sobre la seva experiència. 
            Identifica punts forts i reptes comuns. Inclou 2 cites textuals dins de <div class="ia-quote">"frase"</div>.
            Respon NOMÉS amb el contingut en català formatat per HTML (sense markdown ni blocs de codi).
            DADES:\n${dadesText}`;

            try {
                const response = await fetch(URL_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error?.message || `Error del servidor (${response.status})`);
                }

                if (!data.candidates || !data.candidates[0]) {
                    throw new Error("Resposta buida de la IA");
                }

                const textIA = data.candidates[0].content.parts[0].text;
                content.innerHTML = `
                    <div id="pdfArea" class="prose max-w-none">
                        <div class="text-center mb-8 border-b pb-6">
                            <h2 class="text-2xl font-black mb-1">${nomEscola}</h2>
                            <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Síntesi del procés • ${new Date().toLocaleDateString('ca-ES')}</p>
                        </div>
                        <div class="text-slate-600 leading-relaxed space-y-4">
                            ${textIA.replace(/```html|```/g, '')}
                        </div>
                    </div>
                `;
                btnPdf.classList.remove('hidden');

            } catch (e) {
                console.error(e);
                content.innerHTML = `
                    <div class="p-6 bg-red-50 text-red-700 rounded-2xl border border-red-100 text-sm">
                        <p class="font-bold mb-2">Error de connexió</p>
                        <p class="opacity-80">${e.message}</p>
                        <hr class="my-3 border-red-200">
                        <p class="text-[10px] leading-tight">Suggeriment: Revisa que la clau a 'Configurar API' sigui correcta i no tingui espais. Si és una clau nova de fa segons, espera 1 minut i torna-ho a provar.</p>
                    </div>
                `;
            }
        }

        function tancarModal() { document.getElementById('reportModal').classList.add('hidden'); }
        
        function descarregarPDF() {
            const element = document.getElementById('pdfArea');
            const titol = element.querySelector('h2').innerText;
            html2pdf().from(element).set({
                margin: 15, filename: `Resum_${titol}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save();
        }

        window.onload = carregarDades;
    </script>
</body>
</html>
