<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La veu de l'alumnat: el mural de les idees</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Importem 'Itim' per a les veus dels nens i 'Plus Jakarta Sans' per a la interfície */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Itim&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fcfcfd;
        }

        /* Tipografia infantil més petita i amb bon suport d'accents */
        .child-voice {
            font-family: 'Itim', cursive;
            line-height: 1.3;
            letter-spacing: 0.01em;
        }

        .sticky-note {
            transition: transform 0.2s ease;
        }
        
        .sticky-note:hover {
            transform: scale(1.02) rotate(1deg);
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal-open { overflow: hidden; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- CAPÇALERA -->
    <header class="max-w-7xl mx-auto mb-12 text-center">
        <h1 class="text-3xl md:text-5xl font-black text-slate-900 tracking-tight mb-4">
            La veu de l'alumnat: el mural de les idees
        </h1>
        <p class="text-slate-500 max-w-2xl mx-auto text-lg">
            Explora les veus espontànies dels infants sobre el seu procés d'aprenentatge.
        </p>
        
        <!-- Comptador dinàmic -->
        <div id="counter-container" class="mt-6 hidden items-center justify-center gap-2">
            <div class="bg-indigo-50 text-indigo-700 px-5 py-2 rounded-full text-sm font-bold border border-indigo-100 shadow-sm">
                ✨ Aquest centre ha registrat <span id="respostes-count">0</span> respostes.
            </div>
        </div>

        <!-- SELECTOR DE CENTRES -->
        <div id="filter-container" class="flex flex-wrap justify-center gap-2 mt-8 mb-4">
            <!-- Els botons de centres es carregaran aquí -->
        </div>
        
        <div id="loading-spinner" class="flex justify-center mb-8">
            <div class="loader mr-3"></div>
            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Carregant dades...</span>
        </div>
    </header>

    <!-- MURAL -->
    <main id="mural-grid" class="max-w-[1800px] mx-auto grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6 opacity-0 transition-opacity duration-500">
        <!-- Les columnes es generaran dinàmicament -->
    </main>

    <!-- BOTÓ FOTOGRAFIA -->
    <div id="photo-btn-container" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 hidden">
        <button onclick="openSummary()" class="bg-indigo-600 text-white px-8 py-4 rounded-full font-bold shadow-2xl flex items-center gap-3 hover:scale-105 transition-transform">
            📸 Fotografia del centre
        </button>
    </div>

    <!-- MODAL FOTOGRAFIA -->
    <div id="summary-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl flex flex-col max-h-[90vh] overflow-hidden">
            <div class="p-8 border-b flex justify-between items-center bg-slate-50">
                <div>
                    <p class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-1">Síntesi del Centre</p>
                    <h3 id="modal-school-name" class="text-3xl font-black text-slate-900">Nom de l'Escola</h3>
                </div>
                <button onclick="closeModal()" class="text-3xl p-2 text-slate-400 hover:text-slate-600">&times;</button>
            </div>
            <div id="modal-content" class="p-8 overflow-y-auto space-y-6 flex-1 text-slate-800">
                <!-- Contingut resumit aquí -->
            </div>
            <div class="p-6 bg-slate-50 flex gap-3 border-t">
                <button onclick="window.print()" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-bold text-sm flex items-center justify-center gap-2">
                    Descarregar / Imprimir
                </button>
                <button onclick="closeModal()" class="px-6 py-4 border-2 border-slate-200 rounded-2xl font-bold text-sm text-slate-400">Tancar</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyd8EMwdnW3MVat7v7zWbj5n0CHM5sl8Ket0HZcKdEVAqGysjMqH0POzgTA6NX2LHue3Q/exec";
        
        let allData = [];
        let currentSchool = 'Totes';

        // Hem utilitzat codis Unicode directes que són més estables en navegadors
        const SECTIONS = [
            { title: "M'ha agradat", icon: "\u2764\ufe0f", color: "#fef9c3", border: "#fde047" },
            { title: "He après", icon: "\ud83d\udcd6", color: "#dbeafe", border: "#93c5fd" },
            { title: "M'ha interessat", icon: "\ud83d\udca1", color: "#dcfce7", border: "#86efac" },
            { title: "Dificultats", icon: "\u26a0\ufe0f", color: "#ffedd5", border: "#fdba74" },
            { title: "Dubtes", icon: "\u2753", color: "#f3e8ff", border: "#d8b4fe" }
        ];

        async function fetchData() {
            try {
                const response = await fetch(SCRIPT_URL);
                allData = await response.json();
                document.getElementById('loading-spinner').classList.add('hidden');
                document.getElementById('mural-grid').classList.remove('opacity-0');
                renderFilters();
                renderMural();
            } catch (error) {
                console.error("Error carregant dades", error);
                document.querySelector('#loading-spinner span').innerText = "Error al carregar les dades.";
            }
        }

        function renderFilters() {
            const keys = Object.keys(allData[0] || {});
            const schoolKey = keys.find(k => k.toLowerCase().includes('centre') || k.toLowerCase().includes('escola')) || keys[1];
            const schools = ['Totes', ...new Set(allData.map(d => d[schoolKey]).filter(Boolean))].sort();
            
            const container = document.getElementById('filter-container');
            container.innerHTML = '';
            
            schools.forEach(school => {
                const btn = document.createElement('button');
                btn.className = `filter-btn px-5 py-2.5 rounded-xl text-[11px] font-black uppercase tracking-wider transition-all border ${school === currentSchool ? 'bg-slate-900 text-white border-slate-900 shadow-lg' : 'bg-white text-slate-500 border-slate-200 hover:border-indigo-300'}`;
                btn.innerText = school;
                btn.onclick = () => filterBy(school);
                btn.setAttribute('data-school', school);
                container.appendChild(btn);
            });
        }

        function filterBy(school) {
            currentSchool = school;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const isSelected = btn.getAttribute('data-school') === school;
                btn.className = `filter-btn px-5 py-2.5 rounded-xl text-[11px] font-black uppercase tracking-wider transition-all border ${isSelected ? 'bg-slate-900 text-white border-slate-900 shadow-lg' : 'bg-white text-slate-500 border-slate-200 hover:border-indigo-300'}`;
            });

            const counterContainer = document.getElementById('counter-container');
            const photoBtn = document.getElementById('photo-btn-container');
            
            if (school === 'Totes') {
                counterContainer.classList.add('hidden');
                photoBtn.classList.add('hidden');
            } else {
                const keys = Object.keys(allData[0]);
                const schoolKey = keys.find(k => k.toLowerCase().includes('centre') || k.toLowerCase().includes('escola')) || keys[1];
                const count = allData.filter(d => d[schoolKey] === school).length;
                
                document.getElementById('respostes-count').innerText = count;
                counterContainer.classList.remove('hidden');
                counterContainer.classList.add('flex');
                photoBtn.classList.remove('hidden');
            }

            renderMural();
        }

        function renderMural() {
            const grid = document.getElementById('mural-grid');
            grid.innerHTML = '';
            
            const keys = Object.keys(allData[0] || {});
            const schoolKey = keys.find(k => k.toLowerCase().includes('centre') || k.toLowerCase().includes('escola')) || keys[1];
            
            const filteredData = currentSchool === 'Totes' 
                ? allData 
                : allData.filter(d => d[schoolKey] === currentSchool);

            SECTIONS.forEach((sec, idx) => {
                const colKey = keys[idx + 2];
                const responses = filteredData.filter(d => d[colKey] && d[colKey].toString().trim().length > 1);

                const col = document.createElement('div');
                col.className = 'space-y-4';
                
                let colHTML = `
                    <div class="flex items-center justify-between px-5 py-4 bg-white border border-slate-100 rounded-2xl shadow-sm">
                        <div class="flex items-center gap-2">
                            <span class="text-lg">${sec.icon}</span>
                            <h2 class="font-black uppercase text-[10px] tracking-widest text-slate-500">${sec.title}</h2>
                        </div>
                        <span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full text-[10px] font-bold">${responses.length}</span>
                    </div>
                    <div class="space-y-4">
                `;

                responses.forEach(resp => {
                    colHTML += `
                        <div class="sticky-note p-6 rounded-3xl border-b-4 border-r-4 shadow-sm" style="background-color: ${sec.color}; border-color: ${sec.border}">
                            <p class="child-voice text-lg md:text-xl mb-3 text-slate-800">${resp[colKey]}</p>
                            ${currentSchool === 'Totes' ? `<div class="pt-3 border-t border-black/5"><span class="text-[9px] font-bold uppercase tracking-widest opacity-40">${resp[schoolKey]}</span></div>` : ''}
                        </div>
                    `;
                });

                colHTML += `</div>`;
                col.innerHTML = colHTML;
                grid.appendChild(col);
            });
        }

        function openSummary() {
            const modal = document.getElementById('summary-modal');
            const content = document.getElementById('modal-content');
            document.getElementById('modal-school-name').innerText = currentSchool;
            
            const keys = Object.keys(allData[0]);
            const schoolKey = keys.find(k => k.toLowerCase().includes('centre') || k.toLowerCase().includes('escola')) || keys[1];
            const schoolData = allData.filter(d => d[schoolKey] === currentSchool);
            
            let modalHTML = '';
            
            SECTIONS.forEach((sec, idx) => {
                const colKey = keys[idx + 2];
                const texts = schoolData.map(d => d[colKey]).filter(t => t && t.toString().trim().length > 5);
                
                if (texts.length > 0) {
                    const bestTexts = texts.sort((a, b) => b.length - a.length).slice(0, 3);
                    
                    modalHTML += `
                        <div class="rounded-3xl p-6" style="background-color: ${sec.color}">
                            <div class="flex items-center gap-2 mb-4">
                                <span class="text-xl">${sec.icon}</span>
                                <span class="text-[10px] font-bold uppercase tracking-widest text-slate-500">${sec.title}</span>
                            </div>
                            <div class="space-y-4">
                                ${bestTexts.map(t => `<p class="child-voice text-xl font-medium">"${t}"</p>`).join('')}
                            </div>
                        </div>
                    `;
                }
            });

            content.innerHTML = modalHTML;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.classList.add('modal-open');
        }

        function closeModal() {
            document.getElementById('summary-modal').classList.add('hidden');
            document.body.classList.remove('modal-open');
        }

        window.onload = fetchData;
    </script>
</body>
</html>
