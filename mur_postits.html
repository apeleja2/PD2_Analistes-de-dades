<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural d'idees: la veu de l'alumnat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&family=Itim&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .child-voice {
            font-family: 'Itim', cursive;
            line-height: 1.4;
        }

        /* --- UI WEB --- */
        .sticky-note { transition: all 0.2s ease; }
        .sticky-note:hover { transform: translateY(-4px) rotate(1deg); }

        #summary-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .summary-container {
            background: white;
            max-width: 1000px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 32px;
            padding: 40px;
        }

        .loader {
            border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Estils per al PDF */
        #pdf-template { display: none; width: 1120px; background: white; }
        .pdf-page { padding: 30px 40px; min-height: 780px; box-sizing: border-box; background: white; }
        .pdf-page.page-break { page-break-before: always; }
        .pdf-header-main { border-bottom: 3px solid #0f172a; padding-bottom: 10px; margin-bottom: 20px; }
        .pdf-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; align-items: start; }
        .pdf-note { page-break-inside: avoid; padding: 12px; border-radius: 12px; font-size: 10.5px; border: 1px solid rgba(0,0,0,0.08); box-shadow: 2px 2px 0px rgba(0,0,0,0.03); }
    </style>
</head>
<body class="p-4 md:p-8 relative">

    <!-- Comptador reubicat més amunt per no trepitjar el títol -->
    <div id="global-counter" class="fixed top-4 right-6 z-50 bg-white/90 backdrop-blur-md shadow-md px-4 py-2 rounded-full border border-slate-200 text-slate-900 font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
        <span class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></span>
        <span id="counter-text">Sincronitzant...</span>
    </div>

    <canvas id="video-canvas" width="1280" height="720" class="hidden"></canvas>
    
    <div id="video-overlay" class="fixed inset-0 bg-slate-900/95 z-[200] hidden flex-col items-center justify-center text-center text-white">
        <div class="loader mb-8"></div>
        <h3 class="text-3xl font-black mb-2">Generant vídeo...</h3>
        <p class="text-slate-400 mb-8">Composant diapositives amb música de piano suau</p>
        <div class="w-64 bg-slate-800 rounded-full h-2 mb-4 overflow-hidden">
            <div id="video-progress-bar" class="bg-indigo-500 h-full transition-all duration-300" style="width: 0%"></div>
        </div>
        <p id="video-progress-text" class="text-indigo-400 font-mono text-2xl font-black">0%</p>
    </div>

    <header class="max-w-5xl mx-auto mb-12 text-center pt-8">
        <div class="flex items-center justify-center gap-4 mb-2">
            <h1 class="text-3xl md:text-5xl font-black text-slate-900 tracking-tight">Mural d'idees: la veu de l'alumnat</h1>
            <button onclick="fetchData()" class="p-2 hover:bg-slate-100 rounded-full transition-colors" title="Actualitzar dades">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-600"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg>
            </button>
        </div>
        <p class="text-slate-500 text-lg md:text-xl font-medium mb-8 max-w-2xl mx-auto leading-relaxed">Explora les veus espontànies dels infants sobre el seu procés d'aprenentatge.</p>
        
        <div id="filter-container" class="flex flex-wrap justify-center gap-2 mb-8"></div>
        <div id="loading-spinner" class="flex flex-col items-center justify-center py-12">
            <div class="loader mb-4"></div>
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Sincronitzant dades...</span>
        </div>
    </header>

    <main id="mural-grid" class="max-w-[1750px] mx-auto grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6 opacity-0 transition-opacity duration-700"></main>

    <div id="action-buttons" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 hidden flex gap-4">
        <button onclick="generatePDF()" class="bg-white text-slate-900 border border-slate-200 px-8 py-4 rounded-2xl text-sm font-black shadow-2xl flex items-center gap-3 hover:bg-slate-50 transition-all active:scale-95">
            <span>📄</span> TOTES LES VEUS (PDF)
        </button>
        <button onclick="openSummary()" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl text-sm font-black shadow-2xl flex items-center gap-3 hover:bg-indigo-700 transition-all active:scale-95">
            <span>✨</span> FOTOGRAFIA RESUM
        </button>
    </div>

    <!-- MODAL -->
    <div id="summary-modal" onclick="if(event.target === this) closeModal()">
        <div class="summary-container">
            <div class="flex justify-between items-start mb-10">
                <div>
                    <h2 id="modal-title" class="text-4xl font-black text-slate-900 mb-1"></h2>
                    <p class="text-indigo-500 font-bold text-xs uppercase tracking-widest">Respostes destacades</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="generateVideo()" class="bg-rose-500 hover:bg-rose-600 text-white px-6 py-3 rounded-2xl font-black text-xs shadow-lg transition-all active:scale-95">🎬 GENERAR VÍDEO</button>
                    <button onclick="closeModal()" class="bg-slate-100 p-2 rounded-full">✕</button>
                </div>
            </div>
            <div id="summary-content" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>
    </div>

    <!-- PDF TEMPLATE (HIDDEN) -->
    <div id="pdf-template" class="child-voice"><div id="pdf-body"></div></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyd8EMwdnW3MVat7v7zWbj5n0CHM5sl8Ket0HZcKdEVAqGysjMqH0POzgTA6NX2LHue3Q/exec";
        let allData = [];
        let currentSchool = 'Totes';

        const SECTIONS = [
            { title: "M'ha agradat", icon: "❤️", color: "#fefce8", border: "#fde047", textColor: "#854d0e" },
            { title: "He après", icon: "📖", color: "#eff6ff", border: "#93c5fd", textColor: "#1e40af" },
            { title: "M'ha interessat", icon: "💡", color: "#f0fdf4", border: "#86efac", textColor: "#166534" },
            { title: "Dificultats", icon: "⚠️", color: "#fff7ed", border: "#fdba74", textColor: "#9a3412" },
            { title: "Dubtes", icon: "❓", color: "#faf5ff", border: "#d8b4fe", textColor: "#6b21a8" }
        ];

        async function fetchData() {
            document.getElementById('loading-spinner').classList.remove('hidden');
            document.getElementById('mural-grid').classList.add('opacity-0');
            try {
                const response = await fetch(SCRIPT_URL);
                allData = await response.json();
                document.getElementById('loading-spinner').classList.add('hidden');
                document.getElementById('mural-grid').classList.remove('opacity-0');
                renderFilters();
                renderMural();
            } catch (e) { console.error(e); }
        }

        function getSchoolKey() {
            const keys = Object.keys(allData[0] || {});
            return keys.find(k => k.toLowerCase().includes('centre') || k.toLowerCase().includes('escola')) || keys[1];
        }

        function renderFilters() {
            const schoolKey = getSchoolKey();
            const schools = ['Totes', ...new Set(allData.map(d => d[schoolKey]).filter(Boolean))].sort();
            const container = document.getElementById('filter-container');
            container.innerHTML = '';
            schools.forEach(school => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-xl text-[10px] font-bold uppercase tracking-wider border transition-all ${school === currentSchool ? 'bg-slate-900 text-white border-slate-900 shadow-lg' : 'bg-white text-slate-500 border-slate-200'}`;
                btn.innerText = school;
                btn.onclick = () => { currentSchool = school; filterBy(school); };
                container.appendChild(btn);
            });
        }

        function filterBy(school) {
            renderFilters();
            document.getElementById('action-buttons').classList.toggle('hidden', school === 'Totes');
            renderMural();
        }

        function renderMural() {
            const grid = document.getElementById('mural-grid');
            const counterText = document.getElementById('counter-text');
            grid.innerHTML = '';
            const keys = Object.keys(allData[0] || {});
            const schoolKey = getSchoolKey();
            const filteredData = currentSchool === 'Totes' ? allData : allData.filter(d => d[schoolKey] === currentSchool);

            counterText.innerText = `${filteredData.length} respostes ${currentSchool === 'Totes' ? 'globals' : ''}`;

            SECTIONS.forEach((sec, idx) => {
                const colKey = keys[idx + 2];
                const responses = filteredData.filter(d => d[colKey] && d[colKey].toString().trim().length > 1);
                const col = document.createElement('div');
                col.className = 'flex flex-col gap-4';
                
                let html = `
                    <div class="p-4 bg-white border border-slate-100 rounded-2xl flex flex-col gap-1 shadow-sm">
                        <div class="flex justify-between items-center">
                            <span class="font-black text-[10px] uppercase text-slate-400">${sec.title}</span>
                            <span class="text-xl">${sec.icon}</span>
                        </div>
                        <div class="text-[10px] font-bold text-slate-500 bg-slate-50 self-start px-2 py-0.5 rounded-md mt-1 border border-slate-100">
                            ${responses.length} respostes
                        </div>
                    </div>`;
                
                responses.forEach(resp => {
                    html += `<div class="sticky-note p-5 rounded-3xl border-b-4 border-r-4 shadow-sm" style="background-color: ${sec.color}; border-color: ${sec.border}"><p class="child-voice text-[15px] text-slate-700">${resp[colKey]}</p></div>`;
                });
                col.innerHTML = html;
                grid.appendChild(col);
            });
        }

        function openSummary() {
            const content = document.getElementById('summary-content');
            const schoolKey = getSchoolKey();
            const schoolData = allData.filter(d => d[schoolKey] === currentSchool);
            const keys = Object.keys(allData[0] || {});
            document.getElementById('modal-title').innerText = currentSchool;
            content.innerHTML = '';

            SECTIONS.forEach((sec, idx) => {
                const colKey = keys[idx + 2];
                const texts = schoolData.map(d => d[colKey]).filter(t => t && t.toString().trim().length > 10);
                if (texts.length > 0) {
                    const highlights = texts.sort((a, b) => b.length - a.length).slice(0, 4);
                    const card = document.createElement('div');
                    card.className = "rounded-3xl p-8 border-b-4 border-r-4";
                    card.style.backgroundColor = sec.color; card.style.borderColor = sec.border;
                    card.innerHTML = `<div class="flex items-center gap-3 mb-6"><span class="text-2xl">${sec.icon}</span><span class="text-[11px] font-black uppercase tracking-widest text-slate-500">${sec.title}</span></div><div class="space-y-4">${highlights.map(t => `<p class="child-voice text-lg text-slate-800 leading-snug">"${t}"</p>`).join('')}</div>`;
                    content.appendChild(card);
                }
            });
            document.getElementById('summary-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('summary-modal').style.display = 'none'; }

        // --- MOTOR DE VÍDEO I AUDIO ---
        function createPianoAudio(duration) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const dest = ctx.createMediaStreamDestination();
            const notes = [261.63, 329.63, 392.00, 523.25, 349.23, 440.00];
            const playPianoNote = (freq, time) => {
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, time);
                g.gain.setValueAtTime(0, time);
                g.gain.linearRampToValueAtTime(0.05, time + 0.1);
                g.gain.exponentialRampToValueAtTime(0.0001, time + 3);
                osc.connect(g); g.connect(dest);
                osc.start(time); osc.stop(time + 3);
            };
            for(let t=0; t < duration; t += 2) {
                const note = notes[Math.floor(Math.random() * notes.length)];
                playPianoNote(note, ctx.currentTime + t);
            }
            return dest.stream.getAudioTracks()[0];
        }

        async function generateVideo() {
            const canvas = document.getElementById('video-canvas');
            const ctx = canvas.getContext('2d');
            const overlay = document.getElementById('video-overlay');
            const progressText = document.getElementById('video-progress-text');
            const progressBar = document.getElementById('video-progress-bar');
            
            overlay.style.display = 'flex';
            const schoolKey = getSchoolKey();
            const schoolData = allData.filter(d => d[schoolKey] === currentSchool);
            const keys = Object.keys(allData[0] || {});
            
            const slides = [];
            SECTIONS.forEach((sec, idx) => {
                const colKey = keys[idx + 2];
                const texts = schoolData.map(d => d[colKey]).filter(t => t && t.toString().trim().length > 10);
                if (texts.length > 0) {
                    const sorted = texts.sort((a,b) => b.length - a.length).slice(0, 8);
                    for (let i = 0; i < sorted.length; i += 2) {
                        slides.push({ section: sec, quotes: sorted.slice(i, i + 2) });
                    }
                }
            });

            const FPS = 30;
            const SECONDS_PER_SLIDE = 8;
            const totalDuration = slides.length * SECONDS_PER_SLIDE;
            
            const videoStream = canvas.captureStream(FPS);
            videoStream.addTrack(createPianoAudio(totalDuration + 2));
            const recorder = new MediaRecorder(videoStream, { mimeType: 'video/webm;codecs=vp9', videoBitsPerSecond: 5000000 });
            const chunks = []; recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob); a.download = `Respostes_${currentSchool}.mp4`; a.click();
                overlay.style.display = 'none';
            };
            recorder.start();

            for (let i = 0; i < slides.length; i++) {
                const { section, quotes } = slides[i];
                for (let frame = 0; frame < FPS * SECONDS_PER_SLIDE; frame++) {
                    ctx.fillStyle = 'white'; ctx.fillRect(0,0,1280,720);
                    ctx.fillStyle = section.color; ctx.fillRect(0,0,1280,720);
                    ctx.textAlign = 'center'; ctx.fillStyle = section.textColor;
                    ctx.font = '60px Arial'; ctx.fillText(section.icon, 640, 150);
                    ctx.font = '800 30px Plus Jakarta Sans'; ctx.fillText(section.title.toUpperCase(), 640, 210);
                    
                    ctx.font = '36px Itim'; ctx.fillStyle = '#1e293b';
                    let currentY = 350;
                    quotes.forEach((q) => {
                        const words = `"${q}"`.split(' ');
                        let line = '';
                        words.forEach(w => {
                            if (ctx.measureText(line + w).width > 1000) { 
                                ctx.fillText(line, 640, currentY); line = w + ' '; currentY += 50; 
                            } else { line += w + ' '; }
                        });
                        ctx.fillText(line, 640, currentY); currentY += 130;
                    });

                    const globalProg = Math.round(((i * FPS * SECONDS_PER_SLIDE + frame) / (slides.length * FPS * SECONDS_PER_SLIDE)) * 100);
                    progressText.innerText = globalProg + "%";
                    progressBar.style.width = globalProg + "%";
                    await new Promise(r => requestAnimationFrame(r));
                }
            }
            recorder.stop();
        }

        async function generatePDF() {
            const schoolKey = getSchoolKey();
            const schoolData = allData.filter(d => d[schoolKey] === currentSchool);
            const keys = Object.keys(allData[0]);
            const pdfBody = document.getElementById('pdf-body');
            pdfBody.innerHTML = '';
            let pages = 0;

            SECTIONS.forEach((sec, idx) => {
                const colKey = keys[idx + 2];
                const res = schoolData.filter(d => d[colKey] && d[colKey].toString().trim().length > 1);
                if (res.length > 0) {
                    const div = document.createElement('div');
                    div.className = `pdf-page ${pages++ > 0 ? 'page-break' : ''}`;
                    div.innerHTML = `<div class="pdf-header-main"><h1 style="font-size:24px;font-weight:800;">${sec.icon} ${sec.title}</h1><p style="color:#64748b;font-weight:700;">${currentSchool} · ${res.length} respostes</p></div><div class="pdf-grid">${res.map(r => `<div class="pdf-note" style="background:${sec.color};border-color:${sec.border}"><p>${r[colKey]}</p></div>`).join('')}</div>`;
                    pdfBody.appendChild(div);
                }
            });

            const el = document.getElementById('pdf-template'); el.style.display = 'block';
            await html2pdf().set({ margin:0, filename:`Respostes_${currentSchool}.pdf`, jsPDF:{format:'a4', orientation:'landscape'} }).from(el).save();
            el.style.display = 'none';
        }

        window.onload = fetchData;
    </script>
</body>
</html>
