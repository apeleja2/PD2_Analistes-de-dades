<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de les Idees - Versió Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-mural: #fdfbf7;
            --color-agradat: #fff0f3; 
            --color-apres: #f0fff4;   
            --color-interes: #eef2ff; 
            --color-dificultat: #fff7ed; 
            --color-dubtes: #faf5ff;  
        }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-mural); color: #334155; }
        .handwritten { font-family: 'Patrick Hand', cursive; }
        .title-font { font-family: 'Outfit', sans-serif; font-weight: 900; }
        .post-it { padding: 1.25rem; border-radius: 12px; box-shadow: 2px 2px 0px rgba(0,0,0,0.03); min-height: 80px; display: flex; align-items: center; justify-content: center; text-align: center; border: 1px solid rgba(0,0,0,0.02); }
        .col-0 { background-color: var(--color-agradat); border-bottom: 4px solid #fbcfe8; }
        .col-1 { background-color: var(--color-apres); border-bottom: 4px solid #bbf7d0; }
        .col-2 { background-color: var(--color-interes); border-bottom: 4px solid #c7d2fe; }
        .col-3 { background-color: var(--color-dificultat); border-bottom: 4px solid #fed7aa; }
        .col-4 { background-color: var(--color-dubtes); border-bottom: 4px solid #e9d5ff; }
        .loader { border-top-color: #fbbf24; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .ia-quote { font-family: 'Patrick Hand', cursive; font-size: 1.2rem; color: #475569; border-left: 4px solid #fde047; padding: 1rem; margin: 1rem 0; background: #fefce8; border-radius: 8px; font-style: italic; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div class="fixed top-6 right-6 z-40 flex flex-col items-end gap-3">
        <button onclick="carregarDades()" class="bg-slate-900 text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
        </button>
        <button onclick="obrirConfiguracio()" class="bg-white border border-slate-200 text-slate-500 px-3 py-1 rounded-lg text-[10px] font-bold uppercase tracking-wider shadow-sm">Configurar API</button>
    </div>

    <header class="max-w-7xl mx-auto pt-16 pb-12 text-center px-4">
        <h1 class="text-5xl md:text-7xl title-font text-slate-800 mb-4 tracking-tight">Mural de les Idees</h1>
        <p class="text-slate-400 font-medium uppercase tracking-[0.2em] text-sm">Escoles de Sant Cugat en xarxa</p>
        <div id="filterContainer" class="flex flex-wrap justify-center gap-3 mt-10"></div>
    </header>

    <main class="max-w-[1600px] mx-auto px-6">
        <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
            <div class="loader rounded-full border-4 h-12 w-12 mb-4"></div>
            <p class="handwritten text-2xl text-slate-400">Actualitzant el mural...</p>
        </div>
        <div id="muralGrid" class="space-y-24"></div>
    </main>

    <!-- Modal Resum IA -->
    <div id="reportModal" class="hidden fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-3xl max-h-[90vh] rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col">
            <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-yellow-50/50">
                <h3 class="title-font text-2xl text-slate-800">✨ Foto de les veus</h3>
                <button onclick="tancarModal()" class="text-slate-400 text-2xl hover:text-red-500 transition-colors">✕</button>
            </div>
            <div id="reportContent" class="p-10 overflow-y-auto bg-white"></div>
            <div class="p-6 bg-slate-50 border-t border-slate-100 flex justify-center gap-4">
                <button id="btnDownloadPDF" onclick="descarregarPDF()" class="hidden bg-slate-900 text-white px-10 py-4 rounded-2xl font-bold shadow-lg hover:bg-black transition-all">Descarregar PDF</button>
                <button onclick="tancarModal()" class="px-6 py-4 text-slate-400 font-bold">Tancar</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyd8EMwdnW3MVat7v7zWbj5n0CHM5sl8Ket0HZcKdEVAqGysjMqH0POzgTA6NX2LHue3Q/exec";
        let dadesTotals = [];
        let escolesActives = new Set();
        let clauEscola = "";

        const SECCIONS = [
            { títol: "M'ha agradat...", icona: "❤️" },
            { títol: "He après...", icona: "🎓" },
            { títol: "M'ha interessat...", icona: "🌟" },
            { títol: "Dificultats", icona: "🧩" },
            { títol: "Dubtes", icona: "🤔" }
        ];

        async function carregarDades() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
                dadesTotals = await res.json();
                if (dadesTotals.length > 0) {
                    const claus = Object.keys(dadesTotals[0]);
                    clauEscola = claus.find(k => k.toLowerCase().includes('centre') || k.toLowerCase().includes('escola')) || claus[1];
                    const escolesUniques = [...new Set(dadesTotals.map(d => d[clauEscola]).filter(Boolean))].sort();
                    if (escolesActives.size === 0) escolesUniques.forEach(e => escolesActives.add(e));
                    renderFiltres(escolesUniques);
                    renderMural();
                }
            } catch (e) { console.error(e); }
            finally { document.getElementById('loading').classList.add('hidden'); }
        }

        function renderFiltres(escoles) {
            const container = document.getElementById('filterContainer');
            container.innerHTML = '';
            escoles.forEach(escola => {
                const actiu = escolesActives.has(escola);
                const btn = document.createElement('button');
                btn.className = `px-6 py-2 rounded-xl text-sm font-bold shadow-sm transition-all ${actiu ? 'bg-yellow-100 border-2 border-yellow-400 text-yellow-900' : 'bg-white text-slate-400 border border-slate-200'}`;
                btn.innerText = escola;
                btn.onclick = () => {
                    if (escolesActives.has(escola)) { if (escolesActives.size > 1) escolesActives.delete(escola); }
                    else { escolesActives.add(escola); }
                    renderFiltres(escoles); renderMural();
                };
                container.appendChild(btn);
            });
        }

        function renderMural() {
            const grid = document.getElementById('muralGrid');
            grid.innerHTML = '';
            const claus = Object.keys(dadesTotals[0]);
            Array.from(escolesActives).forEach(escolaNom => {
                const respostes = dadesTotals.filter(d => d[clauEscola] === escolaNom);
                const section = document.createElement('section');
                section.className = "bg-white p-8 md:p-12 rounded-[3rem] border border-slate-100 shadow-sm";
                section.innerHTML = `
                    <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                        <h2 class="title-font text-4xl text-slate-800 italic underline decoration-yellow-300 decoration-8 underline-offset-4">${escolaNom}</h2>
                        <button onclick="ferResumIA('${escolaNom.replace(/'/g, "\\'")}')" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold shadow-lg flex items-center gap-2 hover:bg-black transition-colors">
                            <span>✨ Foto de les veus</span>
                        </button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6">
                        ${SECCIONS.map((sec, i) => {
                            const textos = respostes.map(r => r[claus[i + 2]]).filter(t => t && t.toString().length > 1);
                            return `
                                <div>
                                    <h4 class="text-center text-[10px] uppercase font-black text-slate-300 tracking-[0.2em] mb-4">${sec.icona} ${sec.títol}</h4>
                                    <div class="space-y-4">${textos.map(txt => `<div class="post-it col-${i}"><p class="handwritten text-lg text-slate-700 leading-tight">${txt}</p></div>`).join('')}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                grid.appendChild(section);
            });
        }

        function obrirConfiguracio() {
            const actual = localStorage.getItem('gemini_api_key') || "";
            const nova = prompt("Introdueix la teva API Key de Google AI Studio:", actual);
            if (nova !== null) localStorage.setItem('gemini_api_key', nova.trim());
        }

        async function ferResumIA(nomEscola) {
            const apiKey = localStorage.getItem('gemini_api_key');
            if (!apiKey) { alert("Primer configura la teva API Key."); obrirConfiguracio(); return; }

            const content = document.getElementById('reportContent');
            const btnPdf = document.getElementById('btnDownloadPDF');
            document.getElementById('reportModal').classList.remove('hidden');
            btnPdf.classList.add('hidden');
            content.innerHTML = `<div class="text-center py-20"><div class="loader inline-block rounded-full border-4 h-10 w-10 mb-4"></div><p class="handwritten text-2xl text-slate-500">Analitzant les dades amb Gemini 1.5...</p></div>`;

            // Llista de models per provar en ordre de compatibilitat
            const models = ["gemini-1.5-flash-latest", "gemini-1.5-flash", "gemini-pro"];
            
            const respostes = dadesTotals.filter(d => d[clauEscola] === nomEscola);
            const claus = Object.keys(respostes[0]);
            const dadesText = respostes.map(r => 
                `Agradat: ${r[claus[2]]} | Après: ${r[claus[3]]} | Interès: ${r[claus[4]]} | Dificultat: ${r[claus[5]]} | Dubte: ${r[claus[6]]}`
            ).join('\n');

            const prompt = `Ets un expert en innovació educativa. Analitza aquestes respostes de l'escola ${nomEscola} i redacta un resum inspirador de 5 paràgrafs. 
            Vull que el to sigui professional però humà. Inclou 2 o 3 frases textuals de les dades posant-les dins d'un div amb classe "ia-quote". 
            Escrit tot en català. Respon només amb el text formatat, sense preàmbuls.
            DADES:\n${dadesText}`;

            let errorFinal = "";

            for (const model of models) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    if (response.status === 429) {
                        content.innerHTML += `<p class="text-xs text-orange-400 mt-2">Massa peticions. Esperant 3 segons...</p>`;
                        await new Promise(r => setTimeout(r, 3000));
                        continue; // Reintenta amb el següent o mateix
                    }

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);

                    const textIA = data.candidates[0].content.parts[0].text;
                    content.innerHTML = `
                        <div id="pdfArea" class="p-4">
                            <div class="text-center mb-10">
                                <h2 class="title-font text-4xl text-slate-800">${nomEscola}</h2>
                                <p class="text-slate-400 font-bold uppercase tracking-widest text-[10px] mt-2">Síntesi del procés • ${new Date().toLocaleDateString('ca-ES')}</p>
                                <div class="w-16 h-1 bg-yellow-400 mx-auto mt-4 rounded-full"></div>
                            </div>
                            <div class="prose max-w-none text-slate-600 text-lg leading-relaxed handwritten-paragraphs">
                                ${textIA.replace(/\n/g, '<br>')}
                            </div>
                        </div>
                    `;
                    btnPdf.classList.remove('hidden');
                    return; // Èxit!

                } catch (e) {
                    errorFinal = e.message;
                    console.log(`Error amb model ${model}:`, e.message);
                }
            }

            content.innerHTML = `
                <div class="p-8 bg-red-50 text-red-700 rounded-3xl border border-red-100">
                    <p class="font-bold mb-2">No s'ha pogut connectar amb la IA</p>
                    <p class="text-xs opacity-70 mb-4">Error: ${errorFinal}</p>
                    <div class="text-xs bg-white/60 p-4 rounded-xl space-y-2">
                        <p><strong>Per què passa això?</strong></p>
                        <ul class="list-disc ml-4">
                            <li>La clau d'API pot ser massa nova (espera 2-3 minuts).</li>
                            <li>Has superat el límit de 15 resums per minut.</li>
                            <li>La clau no té activat el model "Gemini 1.5 Flash" a Google AI Studio.</li>
                        </ul>
                    </div>
                </div>
            `;
        }

        function tancarModal() { document.getElementById('reportModal').classList.add('hidden'); }
        
        function descarregarPDF() {
            const element = document.getElementById('pdfArea');
            const titol = element.querySelector('h2').innerText;
            html2pdf().from(element).set({
                margin: 20, filename: `Resum_${titol}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save();
        }

            window.onload = carregarDades;
    </script>
</body>
</html>
