<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Mural de les Idees - Corregit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-mural: #fdfbf7;
            --color-agradat: #fff0f3; 
            --color-apres: #f0fff4;   
            --color-interes: #eef2ff; 
            --color-dificultat: #fff7ed; 
            --color-dubtes: #faf5ff;  
        }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-mural); background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 25px 25px; color: #334155; }
        .handwritten { font-family: 'Patrick Hand', cursive; }
        .title-font { font-family: 'Outfit', sans-serif; font-weight: 900; }
        .post-it { padding: 1.25rem; border-radius: 12px; box-shadow: 2px 2px 0px rgba(0,0,0,0.03); transition: all 0.3s ease; position: relative; min-height: 80px; display: flex; align-items: center; justify-content: center; text-align: center; border: 1px solid rgba(0,0,0,0.02); }
        .col-0 { background-color: var(--color-agradat); border-bottom: 4px solid #fbcfe8; }
        .col-1 { background-color: var(--color-apres); border-bottom: 4px solid #bbf7d0; }
        .col-2 { background-color: var(--color-interes); border-bottom: 4px solid #c7d2fe; }
        .col-3 { background-color: var(--color-dificultat); border-bottom: 4px solid #fed7aa; }
        .col-4 { background-color: var(--color-dubtes); border-bottom: 4px solid #e9d5ff; }
        .btn-escola.active { transform: scale(1.05); background-color: #fef08a !important; border: 2px solid #facc15; color: #854d0e !important; }
        .loader { border-top-color: #fbbf24; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .mural-section { background: white; border-radius: 40px; border: 2px solid #f1f5f9; }
        .config-btn { background: #f8fafc; border: 1px solid #e2e8f0; color: #64748b; padding: 0.5rem 1rem; border-radius: 12px; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
        .ia-quote { font-family: 'Patrick Hand', cursive; font-size: 1.3rem; color: #475569; border-left: 6px solid #fde047; padding: 1.25rem; margin: 1.5rem 0; background: #fefce8; border-radius: 0 1.5rem 1.5rem 0; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div class="fixed top-6 right-6 z-40 flex flex-col items-end gap-3">
        <div class="flex gap-2">
            <button onclick="carregarDades()" class="bg-slate-900 text-white p-3 rounded-full shadow-xl hover:bg-black transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
            </button>
        </div>
        <button onclick="obrirConfiguracio()" class="config-btn shadow-sm hover:bg-white transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            Configurar API Key
        </button>
    </div>

    <header class="max-w-7xl mx-auto pt-16 pb-12 text-center px-4">
        <h1 class="text-5xl md:text-7xl title-font text-slate-800 tracking-tight mb-4">El Mural de les Idees</h1>
        <div id="filterContainer" class="flex flex-wrap justify-center gap-3 mt-8"></div>
    </header>

    <main class="max-w-[1600px] mx-auto px-6">
        <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
            <div class="loader rounded-full border-4 h-12 w-12 mb-4"></div>
            <p class="handwritten text-2xl text-slate-400">Carregant dades...</p>
        </div>
        <div id="muralGrid" class="space-y-24"></div>
    </main>

    <!-- Modal de Resum -->
    <div id="reportModal" class="hidden fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-3xl max-h-[90vh] rounded-[3rem] shadow-2xl overflow-hidden flex flex-col">
            <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-yellow-50">
                <h3 class="title-font text-2xl text-yellow-800 italic">✨ Fotografia del procés</h3>
                <button onclick="tancarModal()" class="text-slate-400 text-2xl hover:text-red-500">✕</button>
            </div>
            <div id="reportContent" class="p-10 overflow-y-auto bg-[#fdfbf7]"></div>
            <div class="p-6 bg-slate-50 border-t border-slate-100 flex justify-end gap-3">
                <button id="btnDownloadPDF" onclick="descarregarPDF()" class="hidden bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold hover:bg-black">Guardar PDF</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyd8EMwdnW3MVat7v7zWbj5n0CHM5sl8Ket0HZcKdEVAqGysjMqH0POzgTA6NX2LHue3Q/exec";
        let dadesTotals = [];
        let escolesUniques = [];
        let escolesActives = new Set();
        let clauEscola = "";

        const SECCIONS = [
            { títol: "M'ha agradat...", icona: "❤️" },
            { títol: "He après...", icona: "🎓" },
            { títol: "M'ha interessat...", icona: "🌟" },
            { títol: "Dificultats", icona: "🧩" },
            { títol: "Dubtes", icona: "🤔" }
        ];

        async function carregarDades() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
                dadesTotals = await res.json();
                if (dadesTotals.length > 0) {
                    const claus = Object.keys(dadesTotals[0]);
                    clauEscola = claus.find(k => k.toLowerCase().includes('centre') || k.toLowerCase().includes('escola')) || claus[1];
                    escolesUniques = [...new Set(dadesTotals.map(d => d[clauEscola]).filter(Boolean))].sort();
                    if (escolesActives.size === 0) escolesUniques.forEach(e => escolesActives.add(e));
                    renderFiltres();
                    renderMural();
                }
            } catch (e) { console.error(e); }
            finally { document.getElementById('loading').classList.add('hidden'); }
        }

        function renderFiltres() {
            const container = document.getElementById('filterContainer');
            container.innerHTML = '';
            escolesUniques.forEach(escola => {
                const actiu = escolesActives.has(escola);
                const btn = document.createElement('button');
                btn.className = `btn-escola px-6 py-2 rounded-2xl text-sm font-bold shadow-sm transition-all ${actiu ? 'active' : 'bg-white text-slate-400 border-slate-100'}`;
                btn.innerText = escola;
                btn.onclick = () => {
                    if (escolesActives.has(escola)) { if (escolesActives.size > 1) escolesActives.delete(escola); }
                    else { escolesActives.add(escola); }
                    renderFiltres(); renderMural();
                };
                container.appendChild(btn);
            });
        }

        function renderMural() {
            const grid = document.getElementById('muralGrid');
            grid.innerHTML = '';
            const claus = Object.keys(dadesTotals[0]);
            Array.from(escolesActives).forEach(escolaNom => {
                const respostes = dadesTotals.filter(d => d[clauEscola] === escolaNom);
                const section = document.createElement('section');
                section.className = "mural-section p-8 md:p-12 mb-16 shadow-sm";
                section.innerHTML = `
                    <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                        <h2 class="title-font text-3xl text-slate-800 italic underline decoration-yellow-300 decoration-4">${escolaNom}</h2>
                        <button onclick="ferResumIA('${escolaNom.replace(/'/g, "\\'")}')" class="bg-yellow-400 hover:bg-yellow-500 text-slate-900 px-8 py-3 rounded-2xl font-black shadow-lg transition-all flex items-center gap-2">
                            <span>✨ Resum de les veus</span>
                        </button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6">
                        ${SECCIONS.map((sec, i) => {
                            const textos = respostes.map(r => r[claus[i + 2]]).filter(t => t && t.toString().length > 1);
                            return `
                                <div>
                                    <h4 class="text-center text-[10px] uppercase font-black text-slate-400 tracking-widest mb-4">${sec.icona} ${sec.títol}</h4>
                                    <div class="space-y-3">${textos.map(txt => `<div class="post-it col-${i}"><p class="handwritten text-lg text-slate-700 leading-tight">${txt}</p></div>`).join('')}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                grid.appendChild(section);
            });
        }

        function obrirConfiguracio() {
            const actual = localStorage.getItem('gemini_api_key') || "";
            const nova = prompt("Introdueix la teva API Key de Google Gemini:", actual);
            if (nova !== null) {
                localStorage.setItem('gemini_api_key', nova.trim());
                if (nova.trim()) alert("API Key guardada!");
            }
        }

        async function callGemini(apiKey, promptText, retries = 3) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                    });
                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    return data.candidates[0].content.parts[0].text;
                } catch (e) {
                    if (i === retries - 1) throw e;
                    await new Promise(r => setTimeout(r, 1000 * (i + 1)));
                }
            }
        }

        async function ferResumIA(nomEscola) {
            const apiKey = localStorage.getItem('gemini_api_key');
            if (!apiKey) { alert("Configura l'API Key primer."); obrirConfiguracio(); return; }

            const content = document.getElementById('reportContent');
            const btnPdf = document.getElementById('btnDownloadPDF');
            document.getElementById('reportModal').classList.remove('hidden');
            btnPdf.classList.add('hidden');
            content.innerHTML = `<div class="text-center py-20"><div class="loader inline-block rounded-full border-4 h-10 w-10 mb-4"></div><p class="handwritten text-2xl text-slate-500">Analitzant les veus dels infants...</p></div>`;

            const respostes = dadesTotals.filter(d => d[clauEscola] === nomEscola);
            const promptDades = respostes.map(r => {
                const c = Object.keys(r);
                return `- Agradat: ${r[c[2]]}, Après: ${r[c[3]]}, Interès: ${r[c[4]]}, Dificultat: ${r[c[5]]}, Dubte: ${r[c[6]]}`;
            }).join('\n');

            try {
                const textIA = await callGemini(apiKey, `Actua com un expert pedagog. Fes un resum executiu i emotiu de les veus dels infants de l'escola ${nomEscola}. 
                Organitza-ho per temes (què els motiva, què han après, què els preocupa). 
                Usa HTML bàsic (<b>, <br>, <ul>, <li>).
                Si trobes una frase molt maca, posa-la literalment així: <div class="ia-quote">"frase"</div>.
                Dades:\n${promptDades}`);

                content.innerHTML = `<div id="pdfArea"><div class="text-center mb-10"><h2 class="title-font text-3xl mb-1">${nomEscola}</h2><p class="handwritten text-slate-400">Fotografia del procés d'aprenentatge</p></div><div class="space-y-6">${textIA}</div></div>`;
                btnPdf.classList.remove('hidden');
            } catch (e) {
                content.innerHTML = `<div class="text-center py-10 text-red-500"><p class="font-bold mb-4">⚠️ Error de l'API</p><p class="text-sm mb-6">${e.message}</p><button onclick="obrirConfiguracio()" class="bg-slate-900 text-white px-6 py-2 rounded-xl">Revisar API Key</button></div>`;
            }
        }

        function tancarModal() { document.getElementById('reportModal').classList.add('hidden'); }
        function descarregarPDF() {
            const element = document.getElementById('pdfArea');
            const titol = element.querySelector('h2').innerText;
            html2pdf().from(element).set({ margin: 20, filename: `Veus_${titol}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).save();
        }

        window.onload = carregarDades;
    </script>
</body>
</html>
