<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de les Idees - Versió Estable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Patrick+Hand&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-mural: #fdfbf7;
            --color-agradat: #fff0f3; 
            --color-apres: #f0fff4;   
            --color-interes: #eef2ff; 
            --color-dificultat: #fff7ed; 
            --color-dubtes: #faf5ff;  
        }
        body { font-family: 'Outfit', sans-serif; background-color: var(--bg-mural); color: #334155; }
        .handwritten { font-family: 'Patrick Hand', cursive; }
        .title-font { font-family: 'Outfit', sans-serif; font-weight: 900; }
        .post-it { padding: 1.25rem; border-radius: 12px; box-shadow: 2px 2px 0px rgba(0,0,0,0.03); min-height: 80px; display: flex; align-items: center; justify-content: center; text-align: center; border: 1px solid rgba(0,0,0,0.02); }
        .col-0 { background-color: var(--color-agradat); border-bottom: 4px solid #fbcfe8; }
        .col-1 { background-color: var(--color-apres); border-bottom: 4px solid #bbf7d0; }
        .col-2 { background-color: var(--color-interes); border-bottom: 4px solid #c7d2fe; }
        .col-3 { background-color: var(--color-dificultat); border-bottom: 4px solid #fed7aa; }
        .col-4 { background-color: var(--color-dubtes); border-bottom: 4px solid #e9d5ff; }
        .loader { border-top-color: #fbbf24; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .mural-section { background: white; border-radius: 40px; border: 2px solid #f1f5f9; }
        .ia-quote { font-family: 'Patrick Hand', cursive; font-size: 1.2rem; color: #475569; border-left: 4px solid #fde047; padding: 1rem; margin: 1rem 0; background: #fefce8; border-radius: 8px; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div class="fixed top-6 right-6 z-40 flex flex-col items-end gap-3">
        <button onclick="carregarDades()" class="bg-slate-900 text-white p-3 rounded-full shadow-xl hover:bg-black">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
        </button>
        <button onclick="obrirConfiguracio()" class="bg-white border border-slate-200 text-slate-500 p-2 rounded-lg text-xs font-bold">Clau API</button>
    </div>

    <header class="max-w-7xl mx-auto pt-16 pb-12 text-center px-4">
        <h1 class="text-5xl md:text-7xl title-font text-slate-800 mb-4">El Mural de les Idees</h1>
        <div id="filterContainer" class="flex flex-wrap justify-center gap-3 mt-8"></div>
    </header>

    <main class="max-w-[1600px] mx-auto px-6">
        <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
            <div class="loader rounded-full border-4 h-12 w-12 mb-4"></div>
            <p class="handwritten text-2xl text-slate-400">Actualitzant el mural...</p>
        </div>
        <div id="muralGrid" class="space-y-24"></div>
    </main>

    <div id="reportModal" class="hidden fixed inset-0 z-50 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-3xl max-h-[90vh] rounded-[3rem] shadow-2xl overflow-hidden flex flex-col">
            <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-yellow-50">
                <h3 class="title-font text-2xl text-yellow-800 italic">✨ Resum de les veus</h3>
                <button onclick="tancarModal()" class="text-slate-400 text-2xl hover:text-red-500">✕</button>
            </div>
            <div id="reportContent" class="p-10 overflow-y-auto bg-[#fdfbf7]"></div>
            <div class="p-6 bg-slate-50 border-t border-slate-100 flex justify-end gap-3">
                <button id="btnDownloadPDF" onclick="descarregarPDF()" class="hidden bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold">Descarregar PDF</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyd8EMwdnW3MVat7v7zWbj5n0CHM5sl8Ket0HZcKdEVAqGysjMqH0POzgTA6NX2LHue3Q/exec";
        let dadesTotals = [];
        let escolesActives = new Set();
        let clauEscola = "";

        const SECCIONS = [
            { títol: "M'ha agradat...", icona: "❤️" },
            { títol: "He après...", icona: "🎓" },
            { títol: "M'ha interessat...", icona: "🌟" },
            { títol: "Dificultats", icona: "🧩" },
            { títol: "Dubtes", icona: "🤔" }
        ];

        async function carregarDades() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const res = await fetch(SCRIPT_URL + "?t=" + Date.now());
                dadesTotals = await res.json();
                if (dadesTotals.length > 0) {
                    const claus = Object.keys(dadesTotals[0]);
                    clauEscola = claus.find(k => k.toLowerCase().includes('centre') || k.toLowerCase().includes('escola')) || claus[1];
                    const escolesUniques = [...new Set(dadesTotals.map(d => d[clauEscola]).filter(Boolean))].sort();
                    if (escolesActives.size === 0) escolesUniques.forEach(e => escolesActives.add(e));
                    renderFiltres(escolesUniques);
                    renderMural();
                }
            } catch (e) { console.error(e); }
            finally { document.getElementById('loading').classList.add('hidden'); }
        }

        function renderFiltres(escoles) {
            const container = document.getElementById('filterContainer');
            container.innerHTML = '';
            escoles.forEach(escola => {
                const actiu = escolesActives.has(escola);
                const btn = document.createElement('button');
                btn.className = `px-6 py-2 rounded-2xl text-sm font-bold shadow-sm transition-all ${actiu ? 'bg-yellow-200 border-2 border-yellow-400 text-yellow-900 scale-105' : 'bg-white text-slate-400 border border-slate-100'}`;
                btn.innerText = escola;
                btn.onclick = () => {
                    if (escolesActives.has(escola)) { if (escolesActives.size > 1) escolesActives.delete(escola); }
                    else { escolesActives.add(escola); }
                    renderFiltres(escoles); renderMural();
                };
                container.appendChild(btn);
            });
        }

        function renderMural() {
            const grid = document.getElementById('muralGrid');
            grid.innerHTML = '';
            const claus = Object.keys(dadesTotals[0]);
            Array.from(escolesActives).forEach(escolaNom => {
                const respostes = dadesTotals.filter(d => d[clauEscola] === escolaNom);
                const section = document.createElement('section');
                section.className = "mural-section p-8 md:p-12 mb-16 shadow-sm";
                section.innerHTML = `
                    <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                        <h2 class="title-font text-3xl text-slate-800 italic underline decoration-yellow-300 decoration-4">${escolaNom}</h2>
                        <button onclick="ferResumIA('${escolaNom.replace(/'/g, "\\'")}')" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold shadow-lg flex items-center gap-2">
                            <span>✨ Resum de les veus</span>
                        </button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6">
                        ${SECCIONS.map((sec, i) => {
                            const textos = respostes.map(r => r[claus[i + 2]]).filter(t => t && t.toString().length > 1);
                            return `
                                <div>
                                    <h4 class="text-center text-[10px] uppercase font-black text-slate-400 tracking-widest mb-4">${sec.icona} ${sec.títol}</h4>
                                    <div class="space-y-3">${textos.map(txt => `<div class="post-it col-${i}"><p class="handwritten text-lg text-slate-700 leading-tight">${txt}</p></div>`).join('')}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;
                grid.appendChild(section);
            });
        }

        function obrirConfiguracio() {
            const nova = prompt("Pega la teva API Key de Gemini:", localStorage.getItem('gemini_api_key') || "");
            if (nova !== null) { localStorage.setItem('gemini_api_key', nova.trim()); }
        }

        async function ferResumIA(nomEscola) {
            const apiKey = localStorage.getItem('gemini_api_key');
            if (!apiKey) { alert("Configura la clau API."); obrirConfiguracio(); return; }

            const content = document.getElementById('reportContent');
            const btnPdf = document.getElementById('btnDownloadPDF');
            document.getElementById('reportModal').classList.remove('hidden');
            btnPdf.classList.add('hidden');
            content.innerHTML = `<div class="text-center py-20"><div class="loader inline-block rounded-full border-4 h-10 w-10 mb-4"></div><p class="handwritten text-2xl text-slate-500">Demanant permís a la IA (Versió Estable 1.5)...</p></div>`;

            // Forcem el model 1.5 Flash que és el que té més quota gratuïta
            const model = "gemini-1.5-flash"; 
            
            try {
                const respostes = dadesTotals.filter(d => d[clauEscola] === nomEscola);
                const claus = Object.keys(respostes[0]);
                const dadesText = respostes.map(r => 
                    `- Agradat: ${r[claus[2]]}\n- Après: ${r[claus[3]]}\n- Interès: ${r[claus[4]]}\n- Dificultat: ${r[claus[5]]}\n- Dubte: ${r[claus[6]]}`
                ).join('\n\n');

                const prompt = `Ets un expert en pedagogia. Analitza aquestes respostes de l'escola ${nomEscola} i redacta un resum estructurat. 
                Escrit en Català. Fes 5 paràgrafs. Inclou algunes frases textuals dins de: <div class="ia-quote">"Frase"</div>.
                DADES:\n${dadesText}`;

                const fetchIA = async () => {
                    return await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                };

                let response = await fetchIA();
                
                // Si rebem error de quota (429), esperem 2 segons i tornem a provar una vegada
                if (response.status === 429) {
                    content.innerHTML += `<p class="text-xs text-orange-500 mt-2">Quota saturada. Reintentant en 2 segons...</p>`;
                    await new Promise(r => setTimeout(r, 2500));
                    response = await fetchIA();
                }

                const result = await response.json();
                if (result.error) throw new Error(result.error.message);

                const textIA = result.candidates[0].content.parts[0].text;
                content.innerHTML = `
                    <div id="pdfArea">
                        <div class="text-center mb-8">
                            <h2 class="title-font text-4xl text-slate-800">${nomEscola}</h2>
                            <p class="text-slate-400 font-bold uppercase tracking-widest text-xs mt-2">Fotografia del procés • ${new Date().toLocaleDateString('ca-ES')}</p>
                        </div>
                        <div class="prose max-w-none text-slate-600 text-lg leading-relaxed">
                            ${textIA.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `;
                btnPdf.classList.remove('hidden');
            } catch (e) {
                content.innerHTML = `
                    <div class="p-8 bg-red-50 text-red-700 rounded-3xl border border-red-100">
                        <p class="font-bold mb-2">La quota de la teva clau ha arribat al límit</p>
                        <p class="text-sm opacity-80 mb-4">${e.message}</p>
                        <div class="text-xs bg-white/50 p-4 rounded-xl">
                            <strong>Solució:</strong> Google limita les claus gratuïtes. 
                            1. Espera 1 minut i torna-ho a provar.<br>
                            2. O crea una clau nova a <a href="https://aistudio.google.com/" target="_blank" class="underline font-bold">Google AI Studio</a>.
                        </div>
                    </div>
                `;
            }
        }

        function tancarModal() { document.getElementById('reportModal').classList.add('hidden'); }
        
        function descarregarPDF() {
            const element = document.getElementById('pdfArea');
            const titol = element.querySelector('h2').innerText;
            html2pdf().from(element).set({
                margin: 15, filename: `Resum_${titol}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 3 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).save();
        }

        window.onload = carregarDades;
    </script>
</body>
</html>
