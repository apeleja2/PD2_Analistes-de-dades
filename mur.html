<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anàlisi de Reflexions - Veu dels Analistes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .school-section { transition: all 0.3s ease; }
        .answer-pill { background: white; border-left: 3px solid #3b82f6; }
        
        /* Estils personalitzats per al scroll */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .loader { border: 3px solid #e2e8f0; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Estil per als botons de filtre */
        .chip {
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }
        .chip-active {
            background-color: #3b82f6 !important;
            color: white !important;
            border-color: #2563eb !important;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Barra de navegació fixa -->
    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4">
        <div class="max-w-full mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2 rounded-lg shadow-md">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <div>
                    <h1 class="font-bold text-slate-800 text-xl tracking-tight">Panell d'Analistes</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Gestió de Grans Volums de Dades</p>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <div class="text-right">
                    <span class="block text-[10px] text-slate-400 font-bold uppercase">Centres Actius</span>
                    <span id="statEscoles" class="text-xl font-bold text-blue-600">0</span>
                </div>
                <div class="text-right border-l pl-6 border-slate-200">
                    <span class="block text-[10px] text-slate-400 font-bold uppercase">Total Respostes</span>
                    <span id="statRespostes" class="text-xl font-bold text-blue-600">0</span>
                </div>
                <button onclick="carregarDades()" id="btnRefresh" class="ml-4 bg-slate-100 hover:bg-slate-200 p-2.5 rounded-full transition-colors">
                    <svg id="refreshIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-full mx-auto p-4 md:p-8">
        
        <!-- Secció de Filtres -->
        <div class="mb-10 text-center">
            <h2 class="text-3xl font-extrabold text-slate-800 mb-2">✨ La Veu dels Analistes</h2>
            <p class="text-slate-500 mb-6">Selecciona els centres que vols analitzar:</p>
            
            <div id="filterWrapper" class="flex flex-wrap justify-center gap-2 max-w-4xl mx-auto bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <div class="flex items-center gap-2 text-slate-400 py-2 px-4 italic text-sm">
                    Carregant centres...
                </div>
            </div>
        </div>

        <!-- Indicador de Càrrega -->
        <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-slate-500 font-medium">Sincronitzant amb el núvol...</p>
        </div>

        <!-- Contingut Principal -->
        <div id="mainContent" class="space-y-8">
            <!-- Les escoles apareixeran aquí -->
        </div>

        <!-- Missatge quan no hi ha dades -->
        <div id="emptyState" class="hidden text-center py-24">
            <div class="text-6xl mb-4">🔍</div>
            <h3 class="text-xl font-bold text-slate-700">No hi ha dades per mostrar</h3>
            <p class="text-slate-400">Selecciona almenys un centre o actualitza la pàgina.</p>
        </div>

    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyd8EMwdnW3MVat7v7zWbj5n0CHM5sl8Ket0HZcKdEVAqGysjMqH0POzgTA6NX2LHue3Q/exec";
        
        let dadesRaw = [];
        let escolesActives = new Set();

        // Noms de les preguntes (ajustar si cal)
        const TITOLS_PREGUNTES = [
            "Més destacat",
            "Aprenentatges",
            "Aplicació pràctica",
            "Dificultats",
            "Dubtes"
        ];

        async function carregarDades() {
            const btn = document.getElementById('refreshIcon');
            const loading = document.getElementById('loading');
            const main = document.getElementById('mainContent');
            
            btn.classList.add('animate-spin');
            loading.classList.remove('hidden');
            main.classList.add('opacity-40');

            try {
                const response = await fetch(`${SCRIPT_URL}?t=${Date.now()}`);
                dadesRaw = await response.json();
                
                if (dadesRaw && dadesRaw.length > 0) {
                    const totesEscoles = [...new Set(dadesRaw.map(item => normalizeValue(item, ['escola', 'centre', 'Centre', 'Escola'])))].filter(e => e !== "-").sort();
                    
                    // Inicialment les activem totes si és la primera càrrega
                    if (escolesActives.size === 0) {
                        totesEscoles.forEach(e => escolesActives.add(e));
                    }

                    actualitzarInterficie(totesEscoles);
                } else {
                    document.getElementById('emptyState').classList.remove('hidden');
                }
            } catch (e) {
                console.error("Error carregant dades", e);
            } finally {
                btn.classList.remove('animate-spin');
                loading.classList.add('hidden');
                main.classList.remove('opacity-40');
            }
        }

        function normalizeValue(obj, keys) {
            for (let k of keys) {
                if (obj[k] && obj[k].toString().trim() !== "") return obj[k].toString().trim();
                // Prova clau en minúscules
                let lowKey = k.toLowerCase();
                if (obj[lowKey] && obj[lowKey].toString().trim() !== "") return obj[lowKey].toString().trim();
            }
            return "-";
        }

        function actualitzarInterficie(llistaEscoles) {
            // Actualitzar Stats
            document.getElementById('statEscoles').innerText = llistaEscoles.length;
            document.getElementById('statRespostes').innerText = dadesRaw.length;

            // Generar Filtres
            const filterContainer = document.getElementById('filterWrapper');
            filterContainer.innerHTML = '';
            
            // Botó "Tots"
            const btnTots = document.createElement('div');
            btnTots.className = `chip px-4 py-2 rounded-xl text-sm font-bold border ${escolesActives.size === llistaEscoles.length ? 'chip-active' : 'bg-slate-50 border-slate-200 text-slate-600'}`;
            btnTots.innerText = "Tots els centres";
            btnTots.onclick = () => {
                if (escolesActives.size === llistaEscoles.length) escolesActives.clear();
                else llistaEscoles.forEach(e => escolesActives.add(e));
                actualitzarInterficie(llistaEscoles);
            };
            filterContainer.appendChild(btnTots);

            llistaEscoles.forEach(escola => {
                const chip = document.createElement('div');
                const isActive = escolesActives.has(escola);
                chip.className = `chip px-4 py-2 rounded-xl text-sm font-semibold border ${isActive ? 'chip-active' : 'bg-white border-slate-200 text-slate-500 hover:border-blue-300'}`;
                chip.innerText = escola;
                chip.onclick = () => {
                    if (escolesActives.has(escola)) escolesActives.delete(escola);
                    else escolesActives.add(escola);
                    actualitzarInterficie(llistaEscoles);
                };
                filterContainer.appendChild(chip);
            });

            renderitzarEscoles();
        }

        function renderitzarEscoles() {
            const container = document.getElementById('mainContent');
            const empty = document.getElementById('emptyState');
            container.innerHTML = '';

            const escolesAFiltrar = Array.from(escolesActives).sort();

            if (escolesAFiltrar.length === 0) {
                empty.classList.remove('hidden');
                return;
            }
            empty.classList.add('hidden');

            escolesAFiltrar.forEach(escolaNom => {
                const respostesEscola = dadesRaw.filter(d => normalizeValue(d, ['escola', 'centre', 'Centre', 'Escola']) === escolaNom);
                
                const section = document.createElement('div');
                section.className = "school-section bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden";
                
                section.innerHTML = `
                    <div class="bg-slate-50 px-8 py-6 border-b border-slate-100 flex justify-between items-center cursor-pointer hover:bg-slate-100/50 transition-colors" onclick="toggleAccordion('${escolaNom}')">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-lg">
                                ${escolaNom.charAt(0)}
                            </div>
                            <div>
                                <h3 class="text-xl font-bold text-slate-800">${escolaNom}</h3>
                                <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">${respostesEscola.length} reflexions registrades</p>
                            </div>
                        </div>
                        <div id="icon-${escolaNom.replace(/\s+/g, '')}" class="transform transition-transform rotate-180">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                            </svg>
                        </div>
                    </div>
                    <div id="content-${escolaNom.replace(/\s+/g, '')}" class="p-4 md:p-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">
                            ${generarColumnes(respostesEscola)}
                        </div>
                    </div>
                `;
                container.appendChild(section);
            });
        }

        function generarColumnes(respostes) {
            let html = '';
            
            // Per a cada una de les 5 preguntes tipus
            for (let i = 1; i <= 5; i++) {
                const clausPregunta = [`pregunta${i}`, `p${i}`, `Pregunta ${i}`];
                
                html += `
                    <div class="flex flex-col gap-4">
                        <h4 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-2 px-2 flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
                            ${TITOLS_PREGUNTES[i-1]}
                        </h4>
                        <div class="space-y-3 max-h-[500px] overflow-y-auto pr-2 custom-scroll">
                            ${respostes.map(r => {
                                const text = normalizeValue(r, clausPregunta);
                                if (text === "-") return "";
                                return `
                                    <div class="answer-pill p-4 rounded-2xl text-xs text-slate-600 leading-relaxed shadow-sm border border-slate-100 hover:border-blue-200 transition-colors">
                                        ${text}
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }
            return html;
        }

        function toggleAccordion(id) {
            const safeId = id.replace(/\s+/g, '');
            const content = document.getElementById(`content-${safeId}`);
            const icon = document.getElementById(`icon-${safeId}`);
            
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                icon.classList.add('rotate-180');
            } else {
                content.classList.add('hidden');
                icon.classList.remove('rotate-180');
            }
        }

        // Càrrega inicial
        window.onload = carregarDades;
    </script>
</body>
</html>
