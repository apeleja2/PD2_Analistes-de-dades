<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recull de Veu - Mural Interactiu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); 
            color: #1e293b; 
        }
        .handwritten { font-family: 'Caveat', cursive; }
        .answer-pill { 
            background: white; 
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease; 
        }
        .answer-pill:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #bae6fd;
        }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .loader { 
            border: 3px solid #f3f3f3; 
            border-top: 3px solid #0ea5e9; 
            border-radius: 50%; 
            width: 30px; 
            height: 30px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .report-body h1 { font-size: 2rem; font-weight: 800; color: #0f172a; margin-bottom: 1.5rem; text-align: center; }
        .report-body .section-title { font-weight: 800; color: #0369a1; margin-top: 1.5rem; display: block; font-size: 1.1rem; }
        .report-body p { margin-bottom: 0.75rem; line-height: 1.6; }
        .report-body em { color: #475569; font-style: italic; background: #f8fafc; padding: 0 4px; border-radius: 4px; }
        
        .intro-question {
            font-size: 1.25rem;
            color: #0284c7;
            font-weight: 700;
            margin-bottom: 1.5rem;
            text-align: center;
            border-bottom: 2px solid #e0f2fe;
            padding-bottom: 1rem;
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-sky-500 text-white p-2 rounded-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                    </svg>
                </div>
                <h1 class="font-bold text-xl text-slate-800">Veu de l'Alumnat</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <span id="statRespostes" class="block text-lg font-bold text-sky-600 line-height-1">0</span>
                    <span class="text-[10px] uppercase text-slate-400 font-bold tracking-widest">Respostes</span>
                </div>
                <button onclick="carregarDades()" id="btnRefresh" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                    <svg id="refreshIcon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <div id="filterWrapper" class="flex flex-wrap gap-2 mb-8 justify-center"></div>

        <div id="loading" class="hidden flex flex-col items-center justify-center py-20">
            <div class="loader mb-4"></div>
            <p class="text-slate-500 font-medium">Actualitzant dades...</p>
        </div>

        <div id="mainContent" class="grid gap-8"></div>
    </main>

    <!-- Modal de Resum -->
    <div id="reportModal" class="hidden fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-3xl max-h-[90vh] rounded-3xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="font-bold text-lg text-slate-800">Resum de la IA</h3>
                <div class="flex gap-2">
                    <button id="btnDownloadPDF" onclick="descarregarPDF()" class="hidden bg-sky-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-sky-700 transition-all">Guardar PDF</button>
                    <button onclick="tancarModal()" class="text-slate-400 hover:text-slate-600 p-2">&times;</button>
                </div>
            </div>
            <div id="reportContent" class="p-8 overflow-y-auto custom-scroll report-body"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyd8EMwdnW3MVat7v7zWbj5n0CHM5sl8Ket0HZcKdEVAqGysjMqH0POzgTA6NX2LHue3Q/exec";
        
        // COMPROVA QUE AQUESTA CLAU ÉS LA MATEIXA DE LA IMATGE
        const API_KEY = "AIzaSyAdGJzArAVvFcnYoLqi853E_7XIR61pLFA"; 
        
        let dadesRaw = [];
        let escolesDisponibles = [];
        let escolesSeleccionades = new Set();
        let clauEscola = "";

        async function fetchIA(payload) {
            // Utilitzem gemini-2.0-flash que és més modern i robust
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;
            
            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                if (!res.ok) {
                    console.error("Error Detallat Google:", data);
                    throw new Error(data.error?.message || "Error desconegut");
                }
                return data;
            } catch (e) {
                console.error("Fetch IA Error:", e);
                throw e;
            }
        }

        async function carregarDades() {
            const icon = document.getElementById('refreshIcon');
            const loading = document.getElementById('loading');
            const content = document.getElementById('mainContent');
            
            icon.classList.add('animate-spin');
            loading.classList.remove('hidden');
            content.innerHTML = '';

            try {
                const res = await fetch(`${SCRIPT_URL}?t=${Date.now()}`);
                dadesRaw = await res.json();
                
                if (dadesRaw && dadesRaw.length > 0) {
                    const keys = Object.keys(dadesRaw[0]);
                    clauEscola = keys.find(k => k.toLowerCase().includes('escola')) || keys[1];
                    
                    const totes = dadesRaw.map(d => d[clauEscola]?.toString().trim()).filter(Boolean);
                    escolesDisponibles = [...new Set(totes)].sort();
                    
                    if (escolesSeleccionades.size === 0) {
                        escolesDisponibles.forEach(e => escolesSeleccionades.add(e));
                    }
                    
                    actualitzarUI();
                }
            } catch (e) {
                console.error("Error carregar dades:", e);
            } finally {
                icon.classList.remove('animate-spin');
                loading.classList.add('hidden');
            }
        }

        function actualitzarUI() {
            document.getElementById('statRespostes').innerText = dadesRaw.length;
            renderFiltres();
            renderCards();
        }

        function renderFiltres() {
            const w = document.getElementById('filterWrapper');
            w.innerHTML = '';
            escolesDisponibles.forEach(esc => {
                const actiu = escolesSeleccionades.has(esc);
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-full text-xs font-bold border transition-all ${actiu ? 'bg-sky-500 border-sky-600 text-white shadow-md' : 'bg-white border-slate-200 text-slate-500 hover:border-sky-300'}`;
                btn.innerText = esc;
                btn.onclick = () => {
                    if (actiu) escolesSeleccionades.delete(esc);
                    else escolesSeleccionades.add(esc);
                    actualitzarUI();
                };
                w.appendChild(btn);
            });
        }

        function renderCards() {
            const container = document.getElementById('mainContent');
            container.innerHTML = '';
            
            Array.from(escolesSeleccionades).forEach(nom => {
                const res = dadesRaw.filter(d => d[clauEscola]?.toString().trim() === nom);
                const section = document.createElement('div');
                section.className = "bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden";
                
                const qIcons = ["⭐", "💡", "🛠️", "🧱", "❓"];
                const qLabels = ["Destacat", "Aprenentatges", "Aplicació", "Obstacles", "Dubtes"];
                const claus = Object.keys(dadesRaw[0]);

                let colHtml = '';
                for(let i=0; i<5; i++) {
                    const qIdx = i + 2; 
                    const texts = res.map(r => r[claus[qIdx]]).filter(t => t && t.length > 1);
                    colHtml += `
                        <div class="space-y-3">
                            <h5 class="text-[10px] font-black text-slate-400 uppercase tracking-tighter flex items-center gap-1">
                                <span>${qIcons[i]}</span> ${qLabels[i]}
                            </h5>
                            <div class="space-y-2 max-h-40 overflow-y-auto pr-2 custom-scroll">
                                ${texts.map(t => `<div class="p-3 bg-slate-50 rounded-xl text-xs text-slate-600 border border-slate-100">${t}</div>`).join('')}
                            </div>
                        </div>
                    `;
                }

                section.innerHTML = `
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                        <h4 class="font-extrabold text-slate-800">${nom} <span class="ml-2 text-xs font-medium text-slate-400">(${res.length} respostes)</span></h4>
                        <button onclick="generarInformeIA('${nom.replace(/'/g, "\\'")}')" class="text-xs bg-white border border-slate-200 px-4 py-2 rounded-xl font-bold hover:bg-sky-50 hover:border-sky-200 transition-all">✨ Generar Resum</button>
                    </div>
                    <div class="p-6 grid grid-cols-1 md:grid-cols-5 gap-6">
                        ${colHtml}
                    </div>
                `;
                container.appendChild(section);
            });
        }

        async function generarInformeIA(nomEscola) {
            const modal = document.getElementById('reportModal');
            const content = document.getElementById('reportContent');
            const btnPdf = document.getElementById('btnDownloadPDF');
            
            modal.classList.remove('hidden');
            btnPdf.classList.add('hidden');
            content.innerHTML = `<div class="flex flex-col items-center py-20"><div class="loader mb-4"></div><p class="text-slate-500">La IA està analitzant les veus...</p></div>`;

            const respostes = dadesRaw.filter(d => d[clauEscola]?.toString().trim() === nomEscola);
            const context = respostes.map(r => {
                const c = Object.keys(r);
                return `Destacat: ${r[c[2]]} | Aprés: ${r[c[3]]} | Obstacle: ${r[c[5]]}`;
            }).join('\n');

            const prompt = `Ets un analista educatiu. Crea un resum curt i bonic per a l'escola "${nomEscola}".
            Estructura:
            1. Títol: "Què diuen els infants de l'escola ${nomEscola}?"
            2. Apartat: <strong>El més destacat</strong> (Paràgraf integrant frases en cursiva <em>).
            3. Apartat: <strong>Aprenentatges</strong> (Llista de punts).
            4. Apartat: <strong>Dificultats</strong> (Breu explicació).
            
            Fes servir català natural i fresc. Evita llenguatge burocràtic. No usis asteriscs (**), usa <strong>.
            Dades: ${context}`;

            try {
                const data = await fetchIA({ contents: [{ parts: [{ text: prompt }] }] });
                let text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                
                // Processament simple per netejar el text de la IA
                let lines = text.split('\n');
                let html = "";
                lines.forEach(l => {
                    if (l.includes('Què diuen')) html += `<div class="intro-question">${l}</div>`;
                    else if (l.includes('<strong>')) html += `<span class="section-title">${l}</span>`;
                    else if (l.trim().length > 0) html += `<p>${l.replace(/_(.*?)_/g, '<em>$1</em>')}</p>`;
                });

                content.innerHTML = `<div id="printableArea"><h1>Resum de Veu: ${nomEscola}</h1>${html}</div>`;
                btnPdf.classList.remove('hidden');
            } catch (err) {
                content.innerHTML = `
                    <div class="text-center py-10">
                        <p class="text-red-500 font-bold">Error d'API Key</p>
                        <p class="text-slate-500 text-sm mt-2">${err.message}</p>
                        <div class="mt-6 bg-amber-50 p-4 rounded-xl text-amber-800 text-xs text-left">
                            <strong>Consell:</strong> Revisa que la clau a Google AI Studio no tingui restriccions d'IP i que el model "Gemini 2.0 Flash" estigui disponible per a la teva regió.
                        </div>
                    </div>
                `;
            }
        }

        function tancarModal() { document.getElementById('reportModal').classList.add('hidden'); }
        
        function descarregarPDF() {
            const element = document.getElementById('printableArea');
            html2pdf().set({ 
                margin: 20, 
                filename: 'Resum_Veu.pdf',
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            }).from(element).save();
        }

        window.onload = carregarDades;
    </script>
</body>
</html>
