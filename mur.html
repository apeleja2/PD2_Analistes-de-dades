<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mur de Reflexions - Tauler del Mestre</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fredoka', sans-serif; background-color: #f0f7ff; }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 1.5rem; background: white; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Estils per als filtres tipus "pill" */
        .filter-chip input { display: none; }
        .filter-chip span {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 9999px;
            background: #ffffff;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            color: #64748b;
        }
        .filter-chip input:checked + span {
            background-color: #3b82f6;
            color: white;
            border-color: #3b82f6;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <!-- Indicadors superiors -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white/50 p-4 rounded-2xl backdrop-blur-sm">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg shadow-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                    </svg>
                </div>
                <div>
                    <h2 class="font-bold text-blue-900 leading-none text-lg">Panell d'Analistes</h2>
                    <p class="text-blue-500 text-xs mt-1">Sincronitzat amb Google Sheets</p>
                </div>
            </div>
            <div class="flex gap-8">
                <div class="text-center">
                    <p class="text-[10px] uppercase font-bold text-gray-400 tracking-widest">Escoles</p>
                    <p id="counterEscoles" class="text-2xl font-bold text-blue-600">0</p>
                </div>
                <div class="text-center border-l pl-8 border-gray-200">
                    <p class="text-[10px] uppercase font-bold text-gray-400 tracking-widest">Respostes</p>
                    <p id="counterRespostes" class="text-2xl font-bold text-blue-600">0</p>
                </div>
            </div>
        </div>

        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-bold text-gray-800 flex items-center justify-center gap-4">
                <span>🌟</span> La Veu dels Analistes
            </h1>
            <p class="text-gray-500 mt-3 text-lg">Visualització de reflexions en temps real</p>
            
            <!-- Àrea de Filtres -->
            <div id="filterContainer" class="mt-8 bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 hidden">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-[0.2em] mb-4">Centres actius (selecciona per mostrar)</p>
                <div class="flex flex-wrap justify-center gap-3" id="schoolFilters">
                    <!-- Els filtres es generen aquí -->
                </div>
                <div class="mt-6">
                    <button onclick="carregarDades()" class="px-8 py-3 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-all shadow-lg hover:shadow-blue-200 flex items-center gap-3 mx-auto font-semibold">
                        <span id="btnIcon">🔄</span>
                        <span id="btnText">Actualitzar dades</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Estats de càrrega -->
        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="loader"></div>
            <p class="mt-4 text-gray-500 animate-pulse">Connectant amb el full de càlcul...</p>
        </div>

        <div id="noData" class="hidden text-center py-20 bg-white rounded-3xl border-2 border-dashed border-gray-200">
            <p class="text-xl text-gray-400 font-semibold">No hi ha respostes per mostrar amb aquests filtres.</p>
        </div>

        <!-- Graella de targetes -->
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyd8EMwdnW3MVat7v7zWbj5n0CHM5sl8Ket0HZcKdEVAqGysjMqH0POzgTA6NX2LHue3Q/exec";

        let dadesGlobals = [];
        let escolesVisibles = new Set();

        // Funció millorada per trobar camps encara que canviïn de nom
        function trobaValor(obj, clausPossibles) {
            for (let clau of clausPossibles) {
                if (obj[clau] !== undefined && obj[clau] !== null && obj[clau].toString().trim() !== "") {
                    return obj[clau];
                }
                // Prova en minúscules i sense espais
                let clauNeta = clau.toLowerCase().replace(/\s+/g, '');
                if (obj[clauNeta] !== undefined && obj[clauNeta] !== null && obj[clauNeta].toString().trim() !== "") {
                    return obj[clauNeta];
                }
            }
            return "-";
        }

        async function carregarDades() {
            const grid = document.getElementById('grid');
            const loading = document.getElementById('loading');
            const noData = document.getElementById('noData');
            const filterContainer = document.getElementById('filterContainer');
            const btnText = document.getElementById('btnText');

            loading.classList.remove('hidden');
            grid.innerHTML = '';
            btnText.innerText = "Sincronitzant...";

            try {
                const response = await fetch(`${URL_SCRIPT}?t=${Date.now()}`);
                dadesGlobals = await response.json();
                
                console.log("Dades rebudes:", dadesGlobals);

                if (!dadesGlobals || dadesGlobals.length === 0) {
                    loading.classList.add('hidden');
                    noData.classList.remove('hidden');
                    return;
                }

                // Identificar totes les escoles úniques
                const llistaEscoles = [...new Set(dadesGlobals.map(d => trobaValor(d, ['escola', 'Escola', 'centre', 'Centre'])))].filter(e => e !== "-").sort();
                
                // Si és la primera vegada, les activem totes
                if (escolesVisibles.size === 0) {
                    llistaEscoles.forEach(e => escolesVisibles.add(e));
                }

                document.getElementById('counterEscoles').innerText = llistaEscoles.length;
                document.getElementById('counterRespostes').innerText = dadesGlobals.length;

                generarFiltres(llistaEscoles);
                filterContainer.classList.remove('hidden');
                loading.classList.add('hidden');
                btnText.innerText = "Actualitzar dades";
                
                renderitzarMur();

            } catch (error) {
                console.error("Error de connexió:", error);
                loading.classList.add('hidden');
                noData.classList.remove('hidden');
                btnText.innerText = "Error de càrrega";
            }
        }

        function generarFiltres(escoles) {
            const container = document.getElementById('schoolFilters');
            container.innerHTML = '';
            
            escoles.forEach(escola => {
                const label = document.createElement('label');
                label.className = 'filter-chip';
                
                const input = document.createElement('input');
                input.type = 'checkbox';
                input.checked = escolesVisibles.has(escola);
                input.value = escola;
                input.onchange = (e) => {
                    if (e.target.checked) escolesVisibles.add(escola);
                    else escolesVisibles.delete(escola);
                    renderitzarMur();
                };

                const span = document.createElement('span');
                span.innerText = escola;

                label.appendChild(input);
                label.appendChild(span);
                container.appendChild(label);
            });
        }

        function renderitzarMur() {
            const grid = document.getElementById('grid');
            const noData = document.getElementById('noData');
            grid.innerHTML = '';

            const respostesFiltrades = dadesGlobals.filter(d => {
                const escolaDoc = trobaValor(d, ['escola', 'Escola', 'centre', 'Centre']);
                return escolesVisibles.has(escolaDoc);
            }).reverse();

            if (respostesFiltrades.length === 0) {
                noData.classList.remove('hidden');
                return;
            }

            noData.classList.add('hidden');

            respostesFiltrades.forEach(r => {
                const escola = trobaValor(r, ['escola', 'Escola', 'centre', 'Centre']);
                const dataRaw = trobaValor(r, ['marcatemporal', 'timestamp', 'data', 'Data']);
                
                // Mapeig de preguntes segons el teu Apps Script
                const p1 = trobaValor(r, ['pregunta1', 'p1', 'Pregunta 1']);
                const p2 = trobaValor(r, ['pregunta2', 'p2', 'Pregunta 2']);
                const p3 = trobaValor(r, ['pregunta3', 'p3', 'Pregunta 3']);
                const p4 = trobaValor(r, ['pregunta4', 'p4', 'Pregunta 4']);
                const p5 = trobaValor(r, ['pregunta5', 'p5', 'Pregunta 5']);

                const targeta = document.createElement('div');
                targeta.className = "card p-8 shadow-sm border-t-[6px] border-blue-500 flex flex-col gap-5";
                targeta.innerHTML = `
                    <div class="flex justify-between items-center border-b border-gray-50 pb-4">
                        <span class="bg-blue-100 text-blue-700 px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider">${escola}</span>
                        <span class="text-gray-300 text-[10px] font-bold">${dataRaw !== "-" ? new Date(dataRaw).toLocaleDateString('ca-ES') : ''}</span>
                    </div>
                    
                    <div class="space-y-5">
                        <div class="bg-blue-50/30 p-4 rounded-2xl">
                            <p class="text-[10px] font-black text-blue-400 uppercase tracking-[0.15em] mb-2 flex items-center gap-2">
                                <span class="text-base">✨</span> Més destacat
                            </p>
                            <p class="text-gray-800 text-sm italic font-medium leading-relaxed">"${p1}"</p>
                        </div>

                        <div>
                            <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.15em] mb-2 flex items-center gap-2">
                                <span class="text-base">💡</span> Aprenentatges
                            </p>
                            <p class="text-gray-600 text-xs leading-relaxed pl-1">${p2}</p>
                        </div>

                        <div class="grid grid-cols-2 gap-4 pt-2">
                            <div class="p-3 rounded-xl bg-orange-50/50">
                                <p class="text-[9px] font-black text-orange-400 uppercase tracking-widest mb-1 flex items-center gap-1">
                                    <span>🚧</span> Dificultat
                                </p>
                                <p class="text-gray-600 text-[11px] leading-tight line-clamp-3">${p4}</p>
                            </div>
                            <div class="p-3 rounded-xl bg-purple-50/50">
                                <p class="text-[9px] font-black text-purple-400 uppercase tracking-widest mb-1 flex items-center gap-1">
                                    <span>❓</span> Dubte
                                </p>
                                <p class="text-gray-600 text-[11px] leading-tight line-clamp-3">${p5}</p>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(targeta);
            });
        }

        // Carrega inicial
        window.onload = carregarDades;
    </script>
</body>
</html>
